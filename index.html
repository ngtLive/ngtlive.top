<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NGT TV - Premium Dashboard</title>
    <meta name="theme-color" content="#0f0f0f">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #8ab4f8;
            --bg-dark: #0f0f0f;
            --surface: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --sidebar-width: 280px;
            --header-height: 60px;
            --accent: #3d5afe;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header Styles --- */
        header {
            height: var(--header-height);
            background: var(--surface);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #333;
            z-index: 1000;
            justify-content: space-between;
        }

        .menu-btn {
            font-size: 24px;
            cursor: pointer;
            color: var(--primary-color);
            background: none;
            border: none;
            transition: 0.3s;
        }

        .brand {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .brand span {
            color: var(--primary-color);
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -100%;
            width: var(--sidebar-width);
            height: 100%;
            background: var(--surface);
            z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            padding-top: 20px;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }

        .nav-links {
            list-style: none;
        }

        .nav-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--text-dim);
            font-weight: 400;
            border-left: 4px solid transparent;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(138, 180, 248, 0.1);
            color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
        }

        .nav-item i {
            width: 25px;
            font-size: 18px;
        }

        /* --- Main Content --- */
        #content-area {
            flex: 1;
            position: relative;
            width: 100%;
            height: calc(100vh - var(--header-height));
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1500;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* --- PC Optimization --- */
        @media (min-width: 1024px) {
            .menu-btn {
                /* ডেস্কটপেও মেনু হাইড রাখা হয়েছে সুন্দর দেখানোর জন্য, চাইলে সবসময় খোলা রাখা যায় */
            }
            
            #content-area {
                max-width: 100%;
                margin: 0 auto;
            }
            
            /* ডেস্কটপে ইফেক্ট আরও স্মুথ করা */
            .sidebar {
                width: 320px;
            }
        }

        /* Download Section Styling inside Menu */
        .download-btn {
            margin-top: 30px;
            padding: 15px 25px;
            background: linear-gradient(135deg, #3d5afe, #8ab4f8);
            color: #000 !important;
            font-weight: 600 !important;
            margin: 20px;
            border-radius: 10px;
            text-align: center;
            display: block;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <!-- Header -->
    <header>
        <button class="menu-btn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="brand">NGT <span>PREMIUM</span></div>
        <div style="width: 24px;"></div> <!-- Spacer -->
    </header>

    <!-- Sidebar Menu -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 style="color: var(--primary-color);">NGT MENU</h2>
            <p style="font-size: 12px; color: #666;">Premium Experience</p>
        </div>
        
        <ul class="nav-links">
            <li class="nav-item active" onclick="loadPage('pcgame.html', this)">
                <i class="fas fa-gamepad"></i> PC Games
            </li>
            <li class="nav-item" onclick="loadPage('home.html', this)">
                <i class="fas fa-house"></i> Home
            </li>
            <li class="nav-item" onclick="loadPage('tv.html', this)">
                <i class="fas fa-tv"></i> Live TV
            </li>
            <li class="nav-item" onclick="loadPage('movie.html', this)">
                <i class="fas fa-film"></i> Movies
            </li>
            <li class="nav-item" onclick="loadPage('18+ADULT.html', this)">
                <i class="fas fa-user-secret"></i> 18+ Content
            </li>
        </ul>

        <a href="#" class="download-btn" onclick="loadPage('download.html', this)">
            <i class="fas fa-download"></i> Download App
        </a>
    </div>

    <!-- Main Content -->
    <main id="content-area">
        <!-- Default page set to pcgame.html as requested -->
        <iframe id="main-frame" src="pcgame.html"></iframe>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const frame = document.getElementById('main-frame');

        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function loadPage(url, element) {
            // আইফ্রেম সোর্স পরিবর্তন
            frame.src = url;

            // মেনু আইটেম একটিভ স্টাইল পরিবর্তন
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            if(element.classList.contains('nav-item')) {
                element.classList.add('active');
            }

            // মেনু অটোমেটিক বন্ধ হবে
            toggleMenu();
        }

        // পিসি ভিউতে সুন্দর দেখানোর জন্য অতিরিক্ত স্ক্রিপ্ট (ঐচ্ছিক)
        window.addEventListener('resize', () => {
            if (window.innerWidth > 1024) {
                // ডেস্কটপ মোডে বিশেষ কিছু চাইলে এখানে করা যাবে
            }
        });
    </script>
</body>
</html>
