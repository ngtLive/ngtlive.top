<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NGT TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --surface: #121212;
            --border-color: #1f1f1f;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #ffffff;
            --sidebar-width: 300px;
            --header-height: 64px;
            --easing: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: var(--header-height);
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            z-index: 100;
        }

        .nav-trigger {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease;
        }

        .nav-trigger:hover {
            opacity: 0.7;
        }

        .brand-logo {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: calc(var(--sidebar-width) * -1);
            width: var(--sidebar-width);
            height: 100%;
            background: var(--surface);
            z-index: 1000;
            transition: left 0.3s var(--easing);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 900;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }

        /* ✅ ADD ONLY THIS */
        .sidebar-header {
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-menu {
            list-style: none;
            padding: 80px 0 20px 0;
            flex-grow: 1;
        }

        .nav-link {
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .nav-link i {
            width: 20px;
            font-size: 18px;
            text-align: center;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
            border-left-color: var(--accent);
        }

        .download-action {
            padding: 32px;
            border-top: 1px solid var(--border-color);
        }

        .btn-download {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            background: var(--text-primary);
            color: var(--bg-primary);
            text-decoration: none;
            border-radius: 4px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s ease;
        }

        .btn-download:active {
            transform: scale(0.97);
        }

        main {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay"></div>

    <header>
        <button class="nav-trigger" id="menuBtn">
            <i class="fa-solid fa-bars-staggered"></i>
        </button>
        <div class="brand-logo">NGT TV</div>
    </header>

    <aside class="sidebar" id="sidebar">

        <!-- ✅ ONLY ADDED THIS LINE -->
        <div class="sidebar-header">NEW GH👻ST TV</div>

        <ul class="nav-menu">
            <li>
                <a class="nav-link active" data-src="pcgame.html">
                    <i class="fa-solid fa-gamepad"></i> PC Games
                </a>
            </li>
            <li>
                <a class="nav-link" data-src="home.html">
                    <i class="fa-solid fa-house"></i> Home
                </a>
            </li>
            <li>
                <a class="nav-link" data-src="tv.html">
                    <i class="fa-solid fa-tv"></i> Live TV
                </a>
            </li>
            <li>
                <a class="nav-link" data-src="movie.html">
                    <i class="fa-solid fa-film"></i> Movies
                </a>
            </li>
            <li>
                <a class="nav-link" data-src="18+ADULT.html">
                    <i class="fa-solid fa-lock"></i> 18+ Vault
                </a>
            </li>
        </ul>

        <div class="download-action">
            <a href="javascript:void(0)" class="btn-download" data-src="download.html">
                <i class="fa-solid fa-cloud-arrow-down"></i> Download App
            </a>
        </div>
    </aside>

    <main>
        <iframe id="viewport" src="pcgame.html" allowfullscreen></iframe>
    </main>

    <script>
        const App = {
            init() {
                this.elements = {
                    menuBtn: document.getElementById('menuBtn'),
                    sidebar: document.getElementById('sidebar'),
                    overlay: document.getElementById('overlay'),
                    viewport: document.getElementById('viewport'),
                    navLinks: document.querySelectorAll('[data-src]')
                };
                this.bindEvents();
            },

            bindEvents() {
                this.elements.menuBtn.addEventListener('click', () => this.toggleNav());
                this.elements.overlay.addEventListener('click', () => this.toggleNav());
                
                this.elements.navLinks.forEach(link => {
                    link.addEventListener('click', (e) => this.handleNavigation(e));
                });
            },

            toggleNav() {
                this.elements.sidebar.classList.toggle('active');
                this.elements.overlay.classList.toggle('active');
            },

            handleNavigation(e) {
                const target = e.currentTarget;
                const source = target.getAttribute('data-src');

                if (source) {
                    this.elements.viewport.src = source;
                    
                    this.elements.navLinks.forEach(el => el.classList.remove('active'));
                    if (target.classList.contains('nav-link')) {
                        target.classList.add('active');
                    }
                    
                    this.toggleNav();
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
