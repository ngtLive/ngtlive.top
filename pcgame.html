<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Games BD - ডাউনলোড</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { background:#0f0f0f; color:white; font-family:system-ui, sans-serif; }

.card { transition: all 0.3s; }
.card:hover { transform:translateY(-8px); box-shadow:0 20px 40px rgba(0,255,150,0.15); }

.box {
    background:#111;
    padding:20px;
    border-radius:16px;
    margin-bottom:20px;
    box-shadow: 0 10px 25px rgba(0,255,150,0.2);
}

/* screenshots */
#screenshotsWrapper { position: relative; }

#screenshotsContainer {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    scroll-behavior: smooth;
}
#screenshotsContainer::-webkit-scrollbar { display: none; }

.screenshot {
    width: 260px;
    height: 160px;
    object-fit: cover;
    border-radius: 12px;
    flex-shrink: 0;
    cursor: pointer;
    transition: 0.3s;
}

.screenshot:hover {
    transform: scale(1.2);
    z-index: 10;
}

/* arrows */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.7);
    border: none;
    color: white;
    font-size: 22px;
    padding: 10px 14px;
    cursor: pointer;
    border-radius: 50%;
    z-index: 20;
}

.arrow:hover { background: rgba(0,255,150,0.5); }

.left-arrow { left: 0; }
.right-arrow { right: 0; }

/* preview */
.preview-img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 12px;
}

/* download */
.download-link {
    background:#1f2937;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,255,150,0.2);
}

.download-link:hover {
    box-shadow: 0 5px 20px rgba(255,0,0,0.6);
    transform: scale(1.02);
}
</style>
</head>

<body class="min-h-screen">

<header class="bg-black/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-800">
<div class="w-full px-2 py-5 flex justify-between items-center">
    <h1 class="text-3xl font-bold text-emerald-400">Gʜ👻ꜱᴛ _ Games</h1>

    <div class="relative w-80">
        <input id="searchInput" oninput="filterGames()" type="text"
        placeholder="গেমের নাম লিখুন..."
        class="w-full bg-gray-900 border border-gray-700 rounded-full py-3 px-5 pl-12 focus:outline-none focus:border-emerald-500">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-500"></i>
    </div>
</div>
</header>

<main class="w-full px-2 py-12">
<div id="gamesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
</main>

<div id="gameModal" class="hidden fixed inset-0 bg-black z-50 flex items-start justify-center">

<div class="w-full h-full bg-gray-900 overflow-y-auto">

    <div class="p-6 flex justify-between items-start">
        <h2 id="modalTitle" class="text-3xl font-bold"></h2>
        <button onclick="closeModal()" class="text-4xl text-gray-500 hover:text-white">&times;</button>
    </div>

    <div class="p-6">

        <div class="box">
            <p class="text-emerald-400 text-sm">𝗔𝗯𝗼𝘂𝘁:</p>
            <p id="modalAbout" class="text-gray-400 mt-2"></p>
        </div>

        <div class="flex gap-6">

            <div class="box w-1/2">
                <h3 class="text-emerald-400 text-xl mb-4">Screenshot</h3>

                <div id="screenshotsWrapper">
                    <button class="arrow left-arrow" onclick="scrollLeft()">&#10094;</button>
                    <button class="arrow right-arrow" onclick="scrollRight()">&#10095;</button>
                    <div id="screenshotsContainer"></div>
                </div>
            </div>

            <div class="box w-1/2">
                <h3 class="text-emerald-400 text-xl mb-4">Preview</h3>
                <img id="previewImage" class="preview-img" src="">
            </div>

        </div>

        <div class="box">
            <p class="text-emerald-400 text-sm">Description:</p>
            <p id="modalDesc" class="text-gray-400 mt-2"></p>
        </div>

        <div class="box">
            <p class="text-lime-200 text-sm">𝗨𝗽𝗹𝗼𝗮𝗱𝗲𝗿 𝗜𝗻𝗳𝗼:</p>
            <p id="modalUploader" class="text-pink-500 mt-2"></p>
        </div>

        <div class="box">
            <h3 class="text-emerald-400 text-xl mb-4">Download link</h3>
            <div id="linksContainer" class="grid gap-4"></div>
        </div>

    </div>

</div>
</div>

<script>
const BIN_ID = '69bb0918aa77b81da9f882b9';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

let allGames = [];

async function loadData() {
    const res = await fetch(API_URL);
    const data = await res.json();
    const record = data.record;
    allGames = Array.isArray(record.games) ? record.games : [record];
    renderGames();
}

function renderGames(filter = '') {
    const container = document.getElementById('gamesContainer');
    container.innerHTML = '';

    const filtered = allGames.filter(g => 
        g.title.toLowerCase().includes(filter.toLowerCase())
    );

    filtered.forEach(game => {
        const card = document.createElement('div');
        card.className = 'card bg-gray-800 rounded-xl overflow-hidden cursor-pointer';
        card.innerHTML = `
            <img src="${game.cover}" class="w-full h-64 object-cover">
            <div class="p-5">
                <h3 class="text-xl font-semibold">${game.title}</h3>
                <p class="text-emerald-400 text-xs mt-2">About:</p>
                <p class="text-gray-400 text-sm line-clamp-2">${game.about || ''}</p>
            </div>
        `;
        card.onclick = () => openModal(game);
        container.appendChild(card);
    });
}

function openModal(game) {
    document.getElementById('modalTitle').textContent = game.title;
    document.getElementById('modalAbout').textContent = game.about || '';
    document.getElementById('modalDesc').textContent = game.desc || '';
    document.getElementById('modalUploader').textContent = game.uploader || '';

    const ss = document.getElementById('screenshotsContainer');
    ss.innerHTML = '';

    game.screenshots.forEach((src, index)=>{
        const img = document.createElement('img');
        img.src = src;
        img.className = 'screenshot';

        img.onmouseenter = () => {
            document.getElementById('previewImage').src = src;
        };

        ss.appendChild(img);

        if(index === 0){
            document.getElementById('previewImage').src = src;
        }
    });

    const links = document.getElementById('linksContainer');
    links.innerHTML = '';

    game.links.forEach(l=>{
        const a = document.createElement('a');
        a.href = l.url;
        a.target="_blank";
        a.className="download-link block p-5 rounded-xl flex justify-between";
        a.innerHTML = `<span>${l.name}</span><i class="fa-solid fa-download"></i>`;
        links.appendChild(a);
    });

    document.getElementById('gameModal').classList.remove('hidden');
}

/* 🔥 FIXED SCROLL */
function scrollLeft(){
    const container = document.getElementById('screenshotsContainer');
    container.scrollLeft -= 300;
}

function scrollRight(){
    const container = document.getElementById('screenshotsContainer');
    container.scrollLeft += 300;
}

function closeModal(){
    document.getElementById('gameModal').classList.add('hidden');
}

function filterGames(){
    renderGames(document.getElementById('searchInput').value);
}

window.onload = loadData;
</script>

</body>
</html>
